spring:
  application:
    name: user
  datasource:
    url: jdbc:mysql://localhost:3307/user-ms
    username: mysql-user
    password: mysql-passsword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081
